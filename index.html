<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Inventory System</title>
    <style>
        :root { 
            --bg-dark: #000000; 
            --card-bg: #111111; 
            --text-main: #ffffff; 
            --text-dim: #aaaaaa;
            --google-green: #2E7D32; 
            --google-green-hover: #1B5E20;
            --border-color: #222222;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .project-credit { 
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.7rem; 
            color: var(--text-dim); 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
        }

        .main-app-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 25px;
            text-align: center;
            width: 100%;
            max-width: 650px;
        }

        .header-meta { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            width: 100%;
            max-width: 650px; 
            margin: 0 auto 20px;
            font-size: 0.9rem;
        }
        
        .left-meta-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .welcome-title { color: var(--google-green); font-weight: bold; text-transform: uppercase; display: none; }
        .current-date { color: var(--text-dim); font-size: 0.9rem; }

        .container { 
            max-width: 650px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            min-height: 95vh; 
        }

        .search-container-fluid {
            width: 100%;
            margin-bottom: 30px;
        }

        .vendor-box-row select {
            width: 160px; 
            padding: 8px 12px; 
            background: #111; 
            color: var(--text-dim); 
            border: 1px solid #2a2a2a; 
            border-radius: 20px; 
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .vendor-box-row select:focus {
            border-color: var(--google-green);
            color: white;
        }

        #selectionPreview { 
            text-align: center; 
            font-weight: bold; 
            margin-bottom: 15px; 
            font-size: 0.9rem; 
            min-height: 1.2em;
            color: var(--google-green);
        }

        .main-search-row { 
            display: flex; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 28px;
            overflow: hidden; 
            background: #161616;
            border: 1px solid #2a2a2a;
            transition: border-color 0.2s;
        }
        .main-search-row:focus-within {
            border-color: var(--google-green);
        }
        
        .input-group-search {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .main-search-row input { 
            border: none;
            padding: 16px 24px;
            font-size: 16px;
            outline: none;
            width: 100%;
            background: transparent;
            color: white;
            box-sizing: border-box;
        }

        .main-search-row select {
            border: none;
            background: #222222;
            color: white;
            padding: 0 15px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            border-left: 1px solid #2a2a2a;
            width: 115px;
        }

        .main-search-row .btn-inline-new {
            background: var(--google-green);
            color: white;
            border: none;
            padding: 0 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .main-search-row .btn-inline-new:hover { 
            background: var(--google-green-hover); 
        }

        .results-wrapper { 
            margin-bottom: 20px; 
        }
        
        .header { display: none; }
        
        .row { 
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            margin-top: 20px;
            padding: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }
        
        .row-vendor {
            font-size: 0.75rem;
            color: var(--google-green);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .row-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-main);
            margin: 2px 0;
        }

        .size-container { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            background: rgba(255,255,255,0.01);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
        }
        .row-size-clean { color: #ffffff; font-weight: bold; font-size: 0.9rem; }
        .row-size-details { color: var(--text-dim); font-size: 0.8rem; margin-left: 5px; }

        .action-container { 
            display: flex; 
            gap: 8px; 
            margin-top: 5px;
        }

        .btn-action {
            background: var(--google-green); 
            color: white; 
            border: none;
            padding: 10px 24px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: bold;
            transition: background 0.2s; 
        }
        .btn-action:hover { background: var(--google-green-hover); }

        #suggestions {
            position: absolute; 
            top: 100%; 
            left: 0; 
            width: 100%; 
            background: #161616; 
            border: 1px solid #2a2a2a;
            z-index: 2000; 
            max-height: 250px; 
            overflow-y: auto; 
            border-radius: 0 0 16px 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            display: none; 
        }
        .suggestion-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #222; font-size: 0.9rem; color: #fff; }
        .suggestion-item:hover { background: #222; color: var(--google-green); }

        #plantDetailCard {
            background: var(--card-bg); 
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            padding: 20px; 
            display: none; 
            margin-bottom: 20px;
        }
        .detail-title { color: var(--google-green); font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .detail-item { font-size: 0.85rem; color: #fff; margin-bottom: 6px; padding-left: 8px; border-left: 2px solid var(--google-green); }

        .order-panel {
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px;
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-top: 15px;
            display: none; 
        }
        .order-panel-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px;
        }
        .order-title { color: var(--google-green); font-size: 0.9rem; font-weight: bold; letter-spacing: 0.5px; }
        .btn-download {
            background: transparent; 
            color: var(--google-green); 
            border: 1px solid var(--google-green);
            padding: 6px 14px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.75rem;
            text-transform: uppercase; 
            transition: all 0.2s;
        }
        .btn-download:hover { background: var(--google-green); color: #fff; }
        
        #orderPreview {
            background: #050505; 
            border: 1px solid #1c1c1c; 
            border-radius: 8px;
            padding: 12px; 
            font-family: monospace; 
            font-size: 0.8rem; 
            white-space: pre-wrap;
            max-height: 150px; 
            overflow-y: auto; 
            color: #ccc;
        }

        .btn-delete-item {
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 0;
            margin-left: 10px;
            transition: all 0.2s;
        }
        .btn-delete-item:hover {
            background: rgba(255, 68, 68, 0.2);
        }

        @media (max-width: 600px) {
            .project-credit { position: static; text-align: center; margin-bottom: 10px; }
            .main-search-row { border-radius: 20px; flex-wrap: wrap; }
            .main-search-row select { width: 100%; border-left: none; border-top: 1px solid #2a2a2a; padding: 12px; }
            .main-search-row .btn-inline-new { width: 100%; padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="project-credit">PROJECT BY Henry P</div>
    
    <div class="main-app-title">🌿 Availability Search</div>

    <div class="header-meta">
        <div class="left-meta-group">
            <div class="current-date" id="currentDate"></div>
            <div class="vendor-box-row">
                <select id="vendorFilter" onchange="handleComboChange()"></select>
            </div>
        </div>
        <div class="welcome-title">WELCOME</div>
    </div>

    <div class="container">
        <div class="search-container-fluid">
            
            <div id="selectionPreview"></div>

            <div class="main-search-row">
                <div class="input-group-search">
                    <!-- Placeholder cambiado aquí según lo solicitado -->
                    <input type="text" id="plantInput" placeholder="Search by name or SKU..." autocomplete="off">
                    <div id="suggestions"></div>
                </div>
                <select id="sizeFilter" onchange="handleComboChange()">
                    <option value="any">Size: Any</option>
                    <option value="01">01G / 2Q</option>
                    <option value="02">02G</option>
                    <option value="03">03G</option>
                    <option value="05">05G</option>
                    <option value="07">07G</option>
                    <option value="10">10G</option>
                    <option value="15">15G</option>
                    <option value="24">24G</option>
                    <option value="36">36G</option>
                </select>
                <button class="btn-inline-new" onclick="resetSearch()">New Search</button>
            </div>
        </div>

        <div class="results-wrapper">
            <div id="resultsHeader" class="header"></div>
            <div id="resultsBody"></div>
        </div>

        <div id="plantDetailCard"></div>

        <div id="orderPanel" class="order-panel">
            <div class="order-panel-header">
                <div class="order-title">CURRENT ORDER LIST</div>
                <button class="btn-download" onclick="downloadOrderFile()">Download Order</button>
            </div>
            <div id="orderPreview">No items added to order yet.</div>
        </div>
    </div>

<script>
    let plantDB = [];
    let suggestionsDB = [];
    let lastSelectedPlantName = "";
    let currentOrder = {}; 

    const formasAIgnorar = ["PREMIUM", "ASSORTED", "STD", "MULT", "PATIO", "ON", "POLE", "BOWL", "GARDEN", "CLAY", "SHRUB", "TREE", "STK", "COLUMN", "DWF", "SD", "MULTI", "TOP"];

    const plantInput = document.getElementById('plantInput');
    const vendorFilter = document.getElementById('vendorFilter');
    const sizeFilter = document.getElementById('sizeFilter');
    const sugBox = document.getElementById('suggestions');
    const resultsBody = document.getElementById('resultsBody');
    const resultsHeader = document.getElementById('resultsHeader');
    const preview = document.getElementById('selectionPreview');
    const detailCard = document.getElementById('plantDetailCard');
    const orderPanel = document.getElementById('orderPanel');
    const orderPreview = document.getElementById('orderPreview');

    function setDate() {
        const now = new Date();
        const options = { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = now.toLocaleDateString('en-US', options);
    }
    setDate();

    async function loadData() {
        try {
            const v = new Date().getTime();
            
            const [resP, resH] = await Promise.all([
                fetch(`plantas.json?v=${v}`), 
                fetch(`home.json?v=${v}`)
            ]);

            plantDB = await resP.json();
            suggestionsDB = await resH.json();

            let vendors = [...new Set(plantDB.map(i => i.company))].filter(Boolean).sort();
            
            const matsudas = vendors.filter(v => v.toUpperCase().startsWith("MATS"));
            const lastPrefixes = ["BELM", "FRAN", "NORM"];
            const lasts = vendors.filter(v => 
                lastPrefixes.some(pref => v.toUpperCase().startsWith(pref))
            );
            const middle = vendors.filter(v => 
                !v.toUpperCase().startsWith("MATS") && 
                !lastPrefixes.some(pref => v.toUpperCase().startsWith(pref))
            );

            const finalVendorOrder = [...matsudas, ...middle, ...lasts];

            vendorFilter.innerHTML = '<option value="any">Vendor (Any)</option>' + 
                finalVendorOrder.map(v => `<option value="${v}">${v}</option>`).join('');
            
        } catch (e) { 
            console.error("Error loading files", e);
            resultsBody.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-dim);">Error loading inventory. Please check GitHub files.</div>`;
        }
    }

    function procesarAbreviacion(texto) {
        let soloNombre = texto.split('(')[0].trim();
        const comillasMatch = soloNombre.match(/'(.*?)'/);
        let primera = soloNombre.split(' ')[0].substring(0, 3);
        if (comillasMatch) {
            let dentro = comillasMatch[1].trim().split(/\s+/);
            if (dentro.length >= 2) return `${primera} ${dentro[0][0]} ${dentro[dentro.length-1].substring(0,4)}`.toLowerCase();
            return `${primera} ${dentro[0].substring(0,4)}`.toLowerCase();
        }
        let palabras = soloNombre.split(/\s+/).filter(p => !formasAIgnorar.includes(p.toUpperCase()));
        if (palabras.length > 1) return `${primera} ${palabras[palabras.length-1].substring(0,4)}`.toLowerCase();
        return soloNombre.substring(0, 8).toLowerCase();
    }

    plantInput.addEventListener('input', function() {
        let rawVal = this.value.toUpperCase();
        let cleanVal = rawVal.replace(/[^A-Z0-9\s]/g, "");
        if (this.value.toUpperCase() !== cleanVal) { this.value = cleanVal; }

        let val = cleanVal.trim();

        if (val !== procesarAbreviacion(lastSelectedPlantName).toUpperCase()) {
            lastSelectedPlantName = "";
        }

        if (val.length >= 2) {
            performSearch();
            const queryWords = val.split(/\s+/).filter(w => w.length > 0);
            const matches = suggestionsDB.filter(s => {
                const name = (s.display_name || "").toUpperCase();
                const skuInfo = (s.variantes || "").toUpperCase();
                return queryWords.every(word => {
                    if (/^\d{4,}$/.test(word)) return skuInfo.includes(`(${word})`);
                    return name.includes(word) || skuInfo.includes(word);
                });
            });

            if (matches.length > 0) {
                sugBox.innerHTML = matches.slice(0, 100).map((m) => {
                    return `<div class="suggestion-item" data-name="${m.display_name.replace(/"/g, '&quot;')}" onclick="applySelection(this.getAttribute('data-name'))">
                        ${m.display_name}
                    </div>`;
                }).join('');
                sugBox.style.display = "block";
            } else { sugBox.style.display = "none"; }
        } else { 
            sugBox.style.display = "none"; 
            if(val === "") {
                detailCard.style.display = "none";
                preview.innerText = ""; 
                lastSelectedPlantName = "";
            }
            performSearch(); 
        }
    });

    function applySelection(nombreLimpio) {
        lastSelectedPlantName = nombreLimpio; 
        preview.innerText = nombreLimpio;
        
        const plantaInfo = suggestionsDB.find(s => s.display_name === nombreLimpio);
        if (plantaInfo && plantaInfo.variantes) {
            const listaVariantes = plantaInfo.variantes.split('|').map(v => `<div class="detail-item">${v.trim()}</div>`).join('');
            detailCard.innerHTML = `<div class="detail-title">Plant Specs: ${nombreLimpio}</div>${listaVariantes}`;
            detailCard.style.display = "block";
        }

        const abreviacion = procesarAbreviacion(nombreLimpio);
        plantInput.value = abreviacion;
        sugBox.style.display = "none";
        performSearch();
    }

    function handleComboChange() {
        plantInput.value = ""; 
        detailCard.style.display = "none";
        preview.innerText = ""; 
        lastSelectedPlantName = "";
        performSearch();
    }

    function performSearch() {
        const q = plantInput.value.toUpperCase().trim();
        const v = vendorFilter.value;
        const s = sizeFilter.value;
        
        if (!q && v === "any" && s === "any") { 
            resultsBody.innerHTML = ""; 
            return; 
        }
        
        let queryWords = [];
        let useFallbackMatching = false;
        let fallbackWords = [];

        if (lastSelectedPlantName && q === procesarAbreviacion(lastSelectedPlantName).toUpperCase()) {
            useFallbackMatching = true;
            fallbackWords = lastSelectedPlantName.toUpperCase().split('Lines')[0].replace(/[^A-Z0-9\s]/g, "").split(/\s+/).filter(Boolean);
        }
        
        queryWords = q.split(/\s+/).filter(Boolean);
        
        const filtered = plantDB.filter(item => {
            const itemName = (item.name || "").toUpperCase();
            const itemSize = (item.size || "").toUpperCase();
            
            let mN = false;
            if (q === "") {
                mN = true;
            } else {
                mN = queryWords.every(w => itemName.includes(w));
                if (!mN && useFallbackMatching) {
                    mN = fallbackWords.every(w => itemName.includes(w));
                }
            }

            const mV = v === "any" || item.company === v;
            let mS = (s === "any") ? true : (s === "01" ? (itemSize.includes("01") || itemSize.includes("2Q")) : itemSize.includes(s.toUpperCase()));
            return mN && mV && mS;
        });

        if(filtered.length > 0) {
            resultsBody.innerHTML = filtered.slice(0, 150).map((i) => {
                const safetyCompany = i.company.replace(/"/g, '&quot;');
                const safetyName = i.name.replace(/"/g, '&quot;');
                
                const onclickCompany = safetyCompany.replace(/'/g, "\\'");
                const onclickName = safetyName.replace(/'/g, "\\'");
                
                const rawSizes = i.size.split(',');
                
                let sizeHTML = '<div class="size-container">';
                let actionHTML = '<div class="action-container">';
                
                rawSizes.forEach(rawSize => {
                    const trimmed = rawSize.trim();
                    if(!trimmed) return;
                    
                    const cleanSizeMatch = trimmed.match(/^([^(]+)/);
                    const cleanSize = cleanSizeMatch ? cleanSizeMatch[1].trim() : trimmed;
                    
                    const detailsMatch = trimmed.match(/\(([^)]+)\)/);
                    const details = detailsMatch ? `(${detailsMatch[1]})` : '';

                    const onclickSize = cleanSize.replace(/"/g, '&quot;').replace(/'/g, "\\'");

                    sizeHTML += `
                        <div>
                            <span class="row-size-clean">${cleanSize}</span>
                            <span class="row-size-details">${details}</span>
                        </div>`;
                        
                    actionHTML += `
                        <button class="btn-action" onclick="addToOrder('${onclickCompany}', '${onclickName}', '${onclickSize}')">Add</button>
                    `;
                });
                
                sizeHTML += '</div>';
                actionHTML += '</div>';
                
                return `
                <div class="row">
                    <div class="row-vendor">🏢 Vendor: ${i.company}</div>
                    <div class="row-name">🌿 ${i.name}</div>
                    <div>${sizeHTML}</div>
                    <div>${actionHTML}</div>
                </div>`;
            }).join('');
        } else {
            resultsBody.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-dim);">No matching stock found.</div>`;
        }
    }

    function addToOrder(company, name, cleanSize) {
        orderPanel.style.display = "block";

        if (!currentOrder[company]) {
            currentOrder[company] = [];
        }

        currentOrder[company].push({
            name: name,
            size: cleanSize.trim().toUpperCase()
        });

        preview.innerText = `ADDED TO ORDER: ${name} (${cleanSize.trim().toUpperCase()}) ✅`;

        updateOrderPreview();
    }

    function removeFromOrder(company, index) {
        currentOrder[company].splice(index, 1);

        if (currentOrder[company].length === 0) {
            delete currentOrder[company];
        }

        updateOrderPreview();
    }

    function updateOrderPreview() {
        const vendorsInOrder = Object.keys(currentOrder);

        if (vendorsInOrder.length === 0) {
            orderPreview.innerHTML = "No items added to order yet.";
            orderPanel.style.display = "none";
            return;
        }

        let htmlOutput = "";
        
        vendorsInOrder.forEach(vendor => {
            htmlOutput += `<div style="color: var(--google-green); margin-bottom: 3px; font-weight: bold; font-size: 0.75rem;">VENDOR: ${vendor}</div>`;
            
            currentOrder[vendor].forEach((plant, index) => {
                const safetyVendor = vendor.replace(/"/g, '&quot;').replace(/'/g, "\\'");
                htmlOutput += `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px dashed #222;">
                    <span>&nbsp;&nbsp;-> ${plant.name} <span style="color: var(--google-green)">[${plant.size}]</span></span>
                    <button 
                        class="btn-delete-item"
                        onclick="removeFromOrder('${safetyVendor}', ${index})">
                        ✕
                    </button>
                </div>`;
            });
            htmlOutput += `<div style="color: #111; margin: 3px 0;">-------------------------------------------</div>`;
        });

        orderPreview.innerHTML = htmlOutput;
    }

    function downloadOrderFile() {
        const vendorsInOrder = Object.keys(currentOrder);

        if (vendorsInOrder.length === 0) {
            alert("Your order list is empty. Add items first!");
            return;
        }

        let textString = "";
        
        vendorsInOrder.forEach(vendor => {
            textString += `COMPANY / VENDOR: ${vendor}\n`;
            textString += `===========================================\n`;
            currentOrder[vendor].forEach((plant, index) => {
                textString += `${index + 1}. ${plant.name} - SIZE: ${plant.size}\n`;
            });
            textString += `\n\n`; 
        });

        const blob = new Blob([textString], { type: 'text/plain;charset=utf-8' });
        const element = document.createElement('a');
        element.href = URL.createObjectURL(blob);
        element.download = `Plant_Order_${new Date().toISOString().slice(0,10)}.txt`;
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    function resetSearch() {
        plantInput.value = ""; 
        vendorFilter.value = "any"; 
        sizeFilter.value = "any";
        preview.innerText = ""; 
        detailCard.style.display = "none";
        resultsBody.innerHTML = "";
        lastSelectedPlantName = "";
        plantInput.focus();
    }

    document.addEventListener('click', (e) => { if (e.target !== plantInput) sugBox.style.display = "none"; });
    document.addEventListener('keydown', (e) => { if (e.key === "Escape") sugBox.style.display = "none"; });

    loadData();
</script>
</body>
</html>
